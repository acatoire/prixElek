name: Integration Tests

# Runs real HTTP calls against materielelectrique.com.
# Kept SEPARATE from unit tests — never blocks PR merges.
# Triggered:
#   - Manually via workflow_dispatch
#   - Daily at 06:00 UTC (catches site changes early) (disabled for now)

on:
  workflow_dispatch:
  # schedule: # to be re-enabled once we have a stable test suite
  #   - cron: '0 6 * * *'

jobs:
  integration:
    name: Integration — materielelectrique.com
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration

      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-report
          path: |
            tests/integration/**/*.xml
          if-no-files-found: ignore
